<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="800" height="600"/>
  
  <!-- Circuit pattern background -->
  <g opacity="0.1" stroke="#2563eb" stroke-width="2" fill="none">
    <path d="M0,100 L200,100 L200,200 L400,200"/>
    <path d="M600,0 L600,150 L800,150"/>
    <path d="M100,400 L100,500 L300,500 L300,600"/>
    <path d="M500,300 L700,300 L700,450"/>
    <circle cx="200" cy="100" r="5" fill="#2563eb"/>
    <circle cx="600" cy="150" r="5" fill="#2563eb"/>
    <circle cx="300" cy="500" r="5" fill="#2563eb"/>
  </g>
  
  <!-- Electrician figure silhouette -->
  <g transform="translate(400, 300)">
    <!-- Glow effect -->
    <ellipse cx="0" cy="50" rx="150" ry="180" fill="url(#glow)"/>
    
    <!-- Body -->
    <path d="M-40,-80 Q-50,-20 -45,40 L-50,120 L-20,120 L-15,60 L15,60 L20,120 L50,120 L45,40 Q50,-20 40,-80 Z" fill="#334155"/>
    
    <!-- Head -->
    <circle cx="0" cy="-110" r="35" fill="#475569"/>
    
    <!-- Hard hat -->
    <path d="M-40,-115 Q0,-150 40,-115 L45,-110 L-45,-110 Z" fill="#facc15"/>
    <rect x="-45" y="-115" width="90" height="8" fill="#eab308"/>
    
    <!-- Arms -->
    <path d="M-45,-30 L-80,20 L-70,40 L-40,0" fill="#334155"/>
    <path d="M45,-30 L90,-10 L85,10 L50,-10" fill="#334155"/>
    
    <!-- Tools -->
    <g transform="translate(-85, 20) rotate(-30)">
      <rect x="-3" y="-30" width="6" height="60" fill="#94a3b8"/>
      <rect x="-8" y="-35" width="16" height="15" fill="#64748b"/>
    </g>
    
    <!-- Lightning effect -->
    <g stroke="#2563eb" stroke-width="3" fill="none" opacity="0.8">
      <path d="M-100,-50 L-80,-20 L-90,0 L-70,30">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M100,-30 L80,0 L90,20 L70,50">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1s"/>
      </path>
    </g>
  </g>
  
  <!-- Text -->
  <text x="400" y="550" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14">
    Electrician at Work (DEMO IMAGE)
  </text>
</svg>
