<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0f172a"/>
  
  <!-- Abstract shapes -->
  <circle cx="200" cy="150" r="150" fill="url(#grad1)" opacity="0.3" filter="url(#blur)"/>
  <circle cx="600" cy="400" r="200" fill="url(#grad2)" opacity="0.2" filter="url(#blur)"/>
  <circle cx="400" cy="300" r="100" fill="url(#grad1)" opacity="0.4" filter="url(#blur)"/>
  
  <!-- Money/Card shapes -->
  <rect x="250" y="200" width="300" height="180" rx="20" fill="url(#grad1)" opacity="0.8" transform="rotate(-15 400 290)"/>
  <rect x="280" y="240" width="300" height="180" rx="20" fill="url(#grad2)" opacity="0.6" transform="rotate(-5 430 330)"/>
  
  <!-- Wave decoration -->
  <path d="M0 500 Q 200 450 400 500 T 800 500 L 800 600 L 0 600 Z" fill="url(#grad1)" opacity="0.3"/>
</svg>