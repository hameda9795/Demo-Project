<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1fae5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#grad)" rx="20"/>
  
  <!-- Abstract person -->
  <circle cx="200" cy="120" r="50" fill="#059669" opacity="0.3"/>
  <circle cx="200" cy="120" r="40" fill="#059669"/>
  
  <!-- Body -->
  <rect x="140" y="180" width="120" height="150" rx="20" fill="#475569"/>
  
  <!-- Phone -->
  <rect x="230" y="200" width="50" height="80" rx="8" fill="#1f2937"/>
  <rect x="235" y="210" width="40" height="60" rx="4" fill="#059669" opacity="0.3"/>
  <circle cx="255" cy="270" r="4" fill="#94a3b8"/>
  
  <!-- Checkmark on phone -->
  <circle cx="255" cy="230" r="12" fill="#059669"/>
  <path d="M250 230 L254 234 L262 226" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Decorative elements -->
  <circle cx="60" cy="60" r="30" fill="#fbbf24" opacity="0.2"/>
  <circle cx="340" cy="340" r="40" fill="#059669" opacity="0.1"/>
