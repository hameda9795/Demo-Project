<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen | De Lunchkamer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor cursor-dot"></div>
    <div class="cursor cursor-outline"></div>

    <!-- Floating Action Button -->
    <a href="https://techsolutionsutrecht.nl/contact" target="_blank" class="fab" aria-label="Contact opnemen">
        <span class="fab-text">Contact</span>
        <span class="fab-pulse"></span>
    </a>

    <!-- Auth Page -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <span class="logo-de">De</span>
                    <span class="logo-main">Lunchkamer</span>
                </a>
                <h1 class="auth-title">Welkom terug</h1>
                <p class="auth-subtitle">Log in om je dashboard te bekijken</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">E-mailadres</label>
                    <input type="email" id="email" name="email" required placeholder="jouw@email.nl">
                </div>
                <div class="form-group">
                    <label for="password">Wachtwoord</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Inloggen</button>
            </form>

            <div class="auth-demo-credentials">
                <p><strong>Demo inloggegevens:</strong></p>
                <p>Gebruikersnaam: <code>demo@delunchkamer.nl</code></p>
                <p>Wachtwoord: <code>demo123</code></p>
            </div>

            <div class="auth-footer">
                <p>Nog geen account? <a href="signup.html">Registreer hier</a></p>
                <p style="margin-top: 0.5rem;"><a href="index.html">← Terug naar website</a></p>
            </div>
        </div>
    </div>

    <!-- Footer Disclaimer (minimal) -->
    <div style="position: fixed; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--color-stone); padding: 0 20px;">
        Dit is een demoversie - alle rechten behoren toe aan <a href="https://www.techsolutionsutrecht.nl" target="_blank" style="color: var(--color-accent);">TechSolutions Utrecht</a>
    </div>

    <script src="script.js"></script>
    <script>
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simple demo validation
            if (email && password) {
                // In a real app, this would validate against a server
                alert('Succesvol ingelogd!\n\nJe wordt doorgestuurd naar het dashboard.');
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
