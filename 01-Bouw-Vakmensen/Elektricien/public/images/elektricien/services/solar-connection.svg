<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect fill="url(#sky)" width="800" height="600"/>
  
  <!-- Sun -->
  <circle cx="700" cy="80" r="50" fill="#facc15" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#facc15" stroke-width="2" opacity="0.5">
    <line x1="700" y1="10" x2="700" y2="-10"/>
    <line x1="700" y1="150" x2="700" y2="170"/>
    <line x1="630" y1="80" x2="610" y2="80"/>
    <line x1="770" y1="80" x2="790" y2="80"/>
    <line x1="650" y1="30" x2="640" y2="20"/>
    <line x1="750" y1="130" x2="760" y2="140"/>
    <line x1="650" y1="130" x2="640" y2="140"/>
    <line x1="750" y1="30" x2="760" y2="20"/>
  </g>
  
  <!-- House roof with solar panels -->
  <g transform="translate(400, 350)">
    <!-- Roof -->
    <path d="M-300,100 L0,-100 L300,100" fill="#374151"/>
    <path d="M-300,100 L0,-100 L300,100 L300,120 L-300,120 Z" fill="#1f2937"/>
    
    <!-- Solar panels -->
    <g transform="translate(-180, 0)">
      <rect x="0" y="0" width="80" height="60" fill="url(#panel)" stroke="#2563eb" stroke-width="2"/>
      <line x1="20" y1="0" x2="20" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="40" y1="0" x2="40" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="60" y1="0" x2="60" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="20" x2="80" y2="20" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
    </g>
    <g transform="translate(-80, 0)">
      <rect x="0" y="0" width="80" height="60" fill="url(#panel)" stroke="#2563eb" stroke-width="2"/>
      <line x1="20" y1="0" x2="20" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="40" y1="0" x2="40" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="60" y1="0" x2="60" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="20" x2="80" y2="20" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
    </g>
    <g transform="translate(20, 0)">
      <rect x="0" y="0" width="80" height="60" fill="url(#panel)" stroke="#2563eb" stroke-width="2"/>
      <line x1="20" y1="0" x2="20" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="40" y1="0" x2="40" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="60" y1="0" x2="60" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="20" x2="80" y2="20" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="80" height="60" fill="url(#panel)" stroke="#2563eb" stroke-width="2"/>
      <line x1="20" y1="0" x2="20" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="40" y1="0" x2="40" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="60" y1="0" x2="60" y2="60" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="20" x2="80" y2="20" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Energy flow animation -->
  <g stroke="#22c55e" stroke-width="3" fill="none" opacity="0.8">
    <path d="M650,80 Q500,150 400,250">
      <animate attributeName="stroke-dasharray" values="0,20;20,0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M400,280 Q300,350 200,400">
      <animate attributeName="stroke-dasharray" values="0,20;20,0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
  </g>
  
  <!-- Inverter -->
  <rect x="150" y="450" width="100" height="80" rx="5" fill="#374151" stroke="#4b5563" stroke-width="2"/>
  <text x="200" y="480" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="12">OMVORMER</text>
  <circle cx="200" cy="505" r="8" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <text x="400" y="580" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14">
    Solar Panel Installation (DEMO IMAGE)
  </text>
</svg>
