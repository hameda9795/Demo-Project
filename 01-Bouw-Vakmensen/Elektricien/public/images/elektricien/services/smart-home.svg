<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg4)" width="800" height="600"/>
  
  <!-- Smart home hub / thermostat -->
  <g transform="translate(300, 150)">
    <!-- Device body -->
    <rect x="0" y="0" width="200" height="300" rx="20" fill="#1f2937" stroke="#374151" stroke-width="4"/>
    
    <!-- Screen -->
    <rect x="15" y="15" width="170" height="270" rx="15" fill="#0f172a"/>
    
    <!-- UI Elements -->
    <!-- Temperature display -->
    <text x="100" y="80" text-anchor="middle" fill="white" font-family="system-ui" font-size="48" font-weight="bold">21.5°</text>
    <text x="100" y="110" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="14">Woonkamer</text>
    
    <!-- Circular slider representation -->
    <circle cx="100" cy="170" r="50" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-dasharray="200 80"/>
    <circle cx="100" cy="170" r="50" fill="none" stroke="#1e3a5f" stroke-width="8"/>
    
    <!-- Control buttons -->
    <g transform="translate(50, 240)">
      <circle cx="20" cy="0" r="15" fill="#2563eb"/>
      <text x="20" y="5" text-anchor="middle" fill="white" font-size="16">−</text>
      
      <text x="50" y="5" fill="#94a3b8" font-family="system-ui" font-size="12">TEMP</text>
      
      <circle cx="80" cy="0" r="15" fill="#2563eb"/>
      <text x="80" y="5" text-anchor="middle" fill="white" font-size="16">+</text>
    </g>
    
    <!-- Icons -->
    <g transform="translate(30, 230)">
      <!-- WiFi -->
      <path d="M0,10 L10,0 L20,10" stroke="#22c55e" stroke-width="2" fill="none"/>
      <circle cx="10" cy="15" r="2" fill="#22c55e"/>
    </g>
    
    <!-- Status indicators -->
    <g transform="translate(150, 235)">
      <circle cx="0" cy="0" r="4" fill="#22c55e">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- Connected devices icons -->
  <g opacity="0.6">
    <!-- Light -->
    <g transform="translate(100, 100)">
      <circle cx="0" cy="0" r="30" fill="#facc15" opacity="0.2"/>
      <path d="M-10,0 L-5,-15 L5,-15 L10,0 L5,10 L-5,10 Z" fill="#facc15"/>
      <line x1="0" y1="10" x2="0" y2="20" stroke="#facc15" stroke-width="3"/>
    </g>
    
    <!-- Lock -->
    <g transform="translate(600, 100)">
      <circle cx="0" cy="0" r="30" fill="#22c55e" opacity="0.2"/>
      <rect x="-10" y="-5" width="20" height="15" rx="2" fill="#22c55e"/>
      <path d="M-10,-5 L-10,-15 Q0,-25 10,-15 L10,-5" fill="none" stroke="#22c55e" stroke-width="3"/>
    </g>
    
    <!-- Fan -->
    <g transform="translate(100, 450)">
      <circle cx="0" cy="0" r="30" fill="#0ea5e9" opacity="0.2"/>
      <circle cx="0" cy="0" r="5" fill="#0ea5e9"/>
      <path d="M0,0 L0,-20 Q10,-20 10,0 Z" fill="#0ea5e9">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M0,0 L17,10 Q17,20 5,15 Z" fill="#0ea5e9">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M0,0 L-17,10 Q-17,20 -5,15 Z" fill="#0ea5e9">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Camera -->
    <g transform="translate(600, 450)">
      <circle cx="0" cy="0" r="30" fill="#dc2626" opacity="0.2"/>
      <rect x="-12" y="-8" width="24" height="16" rx="4" fill="#dc2626"/>
      <circle cx="0" cy="0" r="5" fill="#1f2937"/>
      <circle cx="0" cy="0" r="2" fill="#dc2626">
        <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#2563eb" stroke-width="1" stroke-dasharray="5,5" opacity="0.5">
    <line x1="130" y1="130" x2="300" y2="200"/>
    <line x1="570" y1="130" x2="500" y2="200"/>
    <line x1="130" y1="450" x2="300" y2="400"/>
    <line x1="570" y1="450" x2="500" y2="400"/>
  </g>
  
  <text x="400" y="580" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14">
    Smart Home Controller (DEMO IMAGE)
  </text>
</svg>
