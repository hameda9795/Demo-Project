<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="driveway" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg7)" width="800" height="600"/>
  
  <!-- Driveway -->
  <path d="M0,400 L800,400 L800,600 L0,600 Z" fill="url(#driveway)"/>
  <path d="M0,400 L800,400" stroke="#4b5563" stroke-width="4"/>
  
  <!-- Charging station mounted on wall/post -->
  <g transform="translate(150, 150)">
    <!-- Mounting post -->
    <rect x="-15" y="200" width="30" height="150" fill="#9ca3af"/>
    <rect x="-20" y="340" width="40" height="10" fill="#6b7280"/>
    
    <!-- Wallbox unit -->
    <rect x="-60" y="50" width="120" height="180" rx="15" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
    
    <!-- Branding area -->
    <rect x="-50" y="60" width="100" height="30" rx="5" fill="#1f2937"/>
    <text x="0" y="80" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="bold">WALLBOX</text>
    
    <!-- Display screen -->
    <rect x="-45" y="100" width="90" height="60" rx="5" fill="#0f172a"/>
    <text x="0" y="125" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">STATUS: ACTIEF</text>
    <text x="0" y="145" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="bold">11.0 kW</text>
    
    <!-- LED ring -->
    <circle cx="0" cy="185" r="12" fill="none" stroke="#22c55e" stroke-width="3">
      <animate attributeName="stroke-dasharray" values="0,75;75,0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="185" r="8" fill="#22c55e" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Cable holder -->
    <path d="M60,120 Q90,120 90,150 L90,200" fill="none" stroke="#374151" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Charging cable -->
    <path d="M90,200 Q90,300 150,350" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Car partially visible -->
  <g transform="translate(500, 280)">
    <!-- Rear of EV -->
    <path d="M0,50 L50,0 L250,0 L300,50 L300,150 L0,150 Z" fill="#374151" stroke="#4b5563" stroke-width="2"/>
    <!-- Tail lights -->
    <rect x="10" y="60" width="30" height="40" rx="3" fill="#dc2626">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="260" y="60" width="30" height="40" rx="3" fill="#dc2626">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- EV badge -->
    <rect x="130" y="30" width="40" height="20" rx="3" fill="#22c55e"/>
    <text x="150" y="44" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="bold">EV</text>
    <!-- License plate -->
    <rect x="100" y="110" width="100" height="25" rx="3" fill="#facc15"/>
    <text x="150" y="127" text-anchor="middle" fill="#0f172a" font-family="system-ui" font-size="14" font-weight="bold">EV-001-D</text>
    
    <!-- Charging port with cable connected -->
    <circle cx="50" cy="100" r="15" fill="#1f2937" stroke="#4b5563" stroke-width="2"/>
    <rect x="35" y="95" width="30" height="10" fill="#2563eb"/>
  </g>
  
  <!-- Connection -->
  <path d="M350,450 Q400,400 500,380" stroke="#1f2937" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M350,450 Q400,400 500,380" stroke="#22c55e" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" values="0;30" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <!-- Status indicator -->
  <rect x="600" y="100" width="150" height="60" rx="10" fill="#22c55e" opacity="0.9"/>
  <text x="675" y="125" text-anchor="middle" fill="white" font-family="system-ui" font-size="12">OPGELADEN</text>
  <text x="675" y="145" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="bold">85%</text>
  
  <text x="400" y="580" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14">
    Home Charging Station (DEMO IMAGE)
  </text>
</svg>
