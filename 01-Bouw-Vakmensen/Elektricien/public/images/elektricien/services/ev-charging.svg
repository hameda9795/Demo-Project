<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg3)" width="800" height="600"/>
  
  <!-- Driveway/ground -->
  <rect x="0" y="400" width="800" height="200" fill="#1f2937"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#374151" stroke-width="2"/>
  
  <!-- EV Car -->
  <g transform="translate(150, 220)">
    <!-- Car body -->
    <path d="M50,150 L450,150 L480,100 L480,50 L420,20 L150,20 L80,50 L50,100 Z" fill="url(#carGrad)" stroke="#4b5563" stroke-width="2"/>
    <!-- Windows -->
    <path d="M160,30 L400,30 L440,55 L440,85 L140,85 L140,55 Z" fill="#1e3a5f"/>
    <!-- Wheels -->
    <circle cx="120" cy="150" r="40" fill="#111827" stroke="#374151" stroke-width="3"/>
    <circle cx="120" cy="150" r="20" fill="#4b5563"/>
    <circle cx="380" cy="150" r="40" fill="#111827" stroke="#374151" stroke-width="3"/>
    <circle cx="380" cy="150" r="20" fill="#4b5563"/>
    <!-- Headlight -->
    <ellipse cx="470" cy="100" rx="8" ry="12" fill="#60a5fa"/>
    <!-- EV badge -->
    <rect x="380" y="60" width="40" height="20" rx="3" fill="#22c55e"/>
    <text x="400" y="74" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="bold">EV</text>
  </g>
  
  <!-- Charging station -->
  <g transform="translate(600, 180)">
    <!-- Pole -->
    <rect x="30" y="80" width="40" height="200" rx="5" fill="#e5e7eb"/>
    <rect x="25" y="270" width="50" height="10" rx="2" fill="#9ca3af"/>
    <!-- Unit -->
    <rect x="10" y="0" width="80" height="100" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
    <!-- Screen -->
    <rect x="20" y="15" width="60" height="35" rx="3" fill="#1f2937"/>
    <text x="50" y="38" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="14">11 kW</text>
    <!-- LED indicator -->
    <circle cx="50" cy="65" r="8" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Cable -->
    <path d="M50,80 Q50,150 30,180" stroke="#374151" stroke-width="8" fill="none"/>
    <path d="M30,180 L-150,200" stroke="#374151" stroke-width="6" fill="none"/>
  </g>
  
  <!-- Lightning effect -->
  <g transform="translate(520, 250)" opacity="0.8">
    <path d="M0,0 L-10,20 L0,20 L-15,50 L-5,50 L-20,80" stroke="#22c55e" stroke-width="4" fill="none">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Status text -->
  <rect x="580" y="130" width="120" height="30" rx="5" fill="#22c55e" opacity="0.9"/>
  <text x="640" y="150" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="bold">LADEN...</text>
  
  <text x="400" y="580" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14">
    EV Charging Station (DEMO IMAGE)
  </text>
</svg>
