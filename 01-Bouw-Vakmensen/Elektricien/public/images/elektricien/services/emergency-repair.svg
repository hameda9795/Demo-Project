<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#450a0a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="flashlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#facc15;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#facc15;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect fill="url(#bg5)" width="800" height="600"/>
  
  <!-- Dark environment -->
  <rect x="0" y="0" width="800" height="600" fill="#000" opacity="0.5"/>
  
  <!-- Flashlight beam -->
  <ellipse cx="400" cy="300" rx="250" ry="200" fill="url(#flashlight)"/>
  
  <!-- Electrician silhouette -->
  <g transform="translate(400, 320)">
    <!-- Body -->
    <path d="M-35,-60 Q-45,-20 -40,20 L-45,80 L-20,80 L-15,30 L15,30 L20,80 L45,80 L40,20 Q45,-20 35,-60 Z" fill="#1f2937"/>
    <!-- Head -->
    <circle cx="0" cy="-85" r="28" fill="#374151"/>
    <!-- Hard hat -->
    <path d="M-32,-90 Q0,-115 32,-90 L35,-85 L-35,-85 Z" fill="#facc15"/>
    <!-- Arms working -->
    <path d="M-40,-20 L-70,10 L-60,25 L-35,0" fill="#1f2937"/>
    <path d="M40,-20 L70,-5 L65,15 L45,0" fill="#1f2937"/>
    <!-- Flashlight -->
    <g transform="translate(65, 5) rotate(20)">
      <rect x="0" y="-8" width="30" height="16" rx="3" fill="#4b5563"/>
      <rect x="28" y="-10" width="8" height="20" rx="2" fill="#facc15"/>
      <ellipse cx="36" cy="0" rx="5" ry="10" fill="#fef08a"/>
    </g>
  </g>
  
  <!-- Fuse box being worked on -->
  <g transform="translate(320, 200)">
    <rect x="0" y="0" width="120" height="160" rx="5" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <!-- Open door -->
    <path d="M120,0 L180,20 L180,140 L120,160 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Visible fuses with warning colors -->
    <rect x="15" y="20" width="25" height="40" rx="2" fill="#dc2626"/>
    <rect x="50" y="20" width="25" height="40" rx="2" fill="#dc2626"/>
    <rect x="15" y="70" width="25" height="40" rx="2" fill="#facc15"/>
    <rect x="50" y="70" width="25" height="40" rx="2" fill="#dc2626"/>
    <!-- Sparks -->
    <g stroke="#facc15" stroke-width="2" fill="none">
      <path d="M30,30 L20,10 L40,5">
        <animate attributeName="opacity" values="0;1;0" dur="0.5s" repeatCount="indefinite"/>
      </path>
      <path d="M60,80 L75,60 L85,75">
        <animate attributeName="opacity" values="0;1;0" dur="0.5s" repeatCount="indefinite" begin="0.25s"/>
      </path>
    </g>
  </g>
  
  <!-- Emergency text overlay -->
  <rect x="250" y="500" width="300" height="50" rx="10" fill="#dc2626" opacity="0.9"/>
  <text x="400" y="532" text-anchor="middle" fill="white" font-family="system-ui" font-size="18" font-weight="bold">
    24/7 SPOEDDIENST
  </text>
  
  <text x="400" y="580" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="14">
    Emergency Repair Service (DEMO IMAGE)
  </text>
</svg>
