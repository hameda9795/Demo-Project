<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tablet frame -->
  <rect x="20" y="10" width="360" height="280" rx="20" fill="#1e293b"/>
  <rect x="30" y="20" width="340" height="260" rx="10" fill="url(#screen)"/>
  
  <!-- Screen content -->
  <rect x="50" y="40" width="100" height="20" rx="4" fill="url(#accent)"/>
  <rect x="50" y="70" width="300" height="2" rx="1" fill="#cbd5e1"/>
  
  <!-- Payslip rows -->
  <rect x="50" y="85" width="120" height="12" rx="2" fill="#64748b" opacity="0.5"/>
  <rect x="250" y="85" width="80" height="12" rx="2" fill="#059669" opacity="0.7"/>
  
  <rect x="50" y="105" width="140" height="12" rx="2" fill="#64748b" opacity="0.5"/>
  <rect x="250" y="105" width="80" height="12" rx="2" fill="#059669" opacity="0.7"/>
  
  <rect x="50" y="125" width="100" height="12" rx="2" fill="#64748b" opacity="0.5"/>
  <rect x="250" y="125" width="80" height="12" rx="2" fill="#ef4444" opacity="0.7"/>
  
  <rect x="50" y="155" width="300" height="2" rx="1" fill="#cbd5e1"/>
  
  <!-- Total -->
  <rect x="50" y="170" width="120" height="24" rx="4" fill="#1e293b"/>
  <rect x="220" y="170" width="110" height="24" rx="4" fill="#059669"/>
</svg>